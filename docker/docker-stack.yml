version: '3.8'

# Workout Partner Docker Stack
# Deploy: docker stack deploy -c docker/docker-stack.yml workoutpartner
# Build images first: see build-images.ps1

services:

  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: workoutpartner
      POSTGRES_USER: workoutpartner
      POSTGRES_PASSWORD: workoutpartner_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - db-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workoutpartner -d workoutpartner"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass workoutpartner_redis_password
    volumes:
      - redis_data:/data
    networks:
      - cache-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "workoutpartner_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/workoutpartner
      KC_DB_USERNAME: workoutpartner
      KC_DB_PASSWORD: workoutpartner_password
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    networks:
      - auth-net
      - db-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/null > /dev/tcp/localhost/8080 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 90s

  # ============================================================
  # MICROSERVICES
  # ============================================================

  user-service:
    image: workoutpartner-user-service:latest
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: workoutpartner
      DATABASE_USER: workoutpartner
      DATABASE_PASSWORD: workoutpartner_password
    networks:
      - db-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/api/v1/users/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  workout-service:
    image: workoutpartner-workout-service:latest
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: workoutpartner
      DATABASE_USER: workoutpartner
      DATABASE_PASSWORD: workoutpartner_password
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: workoutpartner_redis_password
    ports:
      - "8002:8002"
    networks:
      - db-net
      - cache-net
      - frontend-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/api/v1/workouts/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  matching-service:
    image: workoutpartner-matching-service:latest
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: workoutpartner
      DATABASE_USER: workoutpartner
      DATABASE_PASSWORD: workoutpartner_password
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: workoutpartner_redis_password
      USER_SERVICE_URL: http://user-service:8001
    ports:
      - "8003:8003"
    networks:
      - db-net
      - cache-net
      - frontend-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/api/v1/matching/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  gym-service:
    image: workoutpartner-gym-service:latest
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: workoutpartner_redis_password
      OVERPASS_API_URL: https://overpass-api.de/api/interpreter
      GYM_CACHE_TTL: "21600"
    networks:
      - cache-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================================
  # API GATEWAY
  # ============================================================

  api-gateway:
    image: workoutpartner-api-gateway:latest
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_EXTERNAL_URL: http://localhost:8080
      KEYCLOAK_REALM: workoutpartner
      KEYCLOAK_CLIENT_ID: workoutpartner-client
      USER_SERVICE_URL: http://user-service:8001
      WORKOUT_SERVICE_URL: http://workout-service:8002
      WORKOUT_WS_URL: http://workout-service:8002
      MATCHING_SERVICE_URL: http://matching-service:8003
      GYM_SERVICE_URL: http://gym-service:8004
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: workoutpartner_redis_password
    ports:
      - "8000:8000"
    networks:
      - frontend-net
      - auth-net
      - db-net
      - cache-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # FRONTEND
  # ============================================================

  frontend:
    image: workoutpartner-frontend:latest
    ports:
      - "3000:3000"
    networks:
      - frontend-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  db-net:
    driver: overlay
    attachable: true
  auth-net:
    driver: overlay
    attachable: true
  frontend-net:
    driver: overlay
    attachable: true
  cache-net:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  redis_data:
